const { chromium } = require('playwright');

(async () => {
  try {
    const browser = await chromium.launch({ headless: true });
    const context = await browser.newContext({
      acceptDownloads: true
    });
    const page = await context.newPage();

    await page.goto('https://sip.gdu.com.uy/SIP/', {
      waitUntil: 'networkidle'
    });

    // Esperar inputs de fecha (ajustar si cambia el selector)
    await page.waitForTimeout(5000);

    // ⚠️ IMPORTANTE: estos selectores pueden necesitar ajuste
    const inputs = await page.$$('input[type="date"]');

    if (inputs.length >= 2) {
      await inputs[0].fill('2026-05-20');
      await inputs[1].fill('2026-05-20');
    }

    // Intentar click en botón descargar
    const downloadPromise = page.waitForEvent('download', { timeout: 15000 });

    await page.click('a:has-text("Descargar")');

    const download = await downloadPromise;

    await download.saveAs('stock.csv');

    console.log('CSV descargado correctamente');

    await browser.close();
  } catch (error) {
    console.error('ERROR:', error);
    process.exit(1);
  }
})();
